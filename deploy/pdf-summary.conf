# /etc/nginx/sites-available/pdf-summary.conf
# (symlink into /etc/nginx/sites-enabled/ or drop into /etc/nginx/conf.d/)
#
# HTTP-only. SSL/TLS to be added separately (e.g. via certbot).

server {
    listen 80;
    listen [::]:80;
    server_name pdf-api.niheshr.com;

    # PDF uploads are capped at 50 MB in the application; allow headroom for multipart overhead.
    client_max_body_size 60M;

    # Reasonable timeouts for OpenAI-backed endpoints (chat, summarization).
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Don't buffer large request bodies on disk; stream them through.
    proxy_request_buffering off;

    access_log /var/log/nginx/pdf-summary.access.log;
    error_log  /var/log/nginx/pdf-summary.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Pass Authorization header through unchanged.
        proxy_pass_request_headers on;

        # WebSocket-friendly (harmless if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
