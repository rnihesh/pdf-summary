<svg width="1024" height="1024" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <rect width="260" height="260" fill="#0A2463"/>
  <g fill="none" stroke="#4FA463" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hexagon -->
    <path stroke-width="2.5" d="M130,40 L208,85 L208,175 L130,220 L52,175 L52,85 Z"/>
    <!-- Outer visible interior -->
    <line stroke-width="2" x1="130" y1="130" x2="208" y2="85"/>
    <line stroke-width="2" x1="130" y1="130" x2="130" y2="220"/>
    <line stroke-width="2" x1="130" y1="130" x2="52"  y2="85"/>
    <!-- Outer hidden interior -->
    <line stroke-width="1.2" stroke-opacity="0.22" x1="130" y1="130" x2="130" y2="40"/>
    <line stroke-width="1.2" stroke-opacity="0.22" x1="130" y1="130" x2="208" y2="175"/>
    <line stroke-width="1.2" stroke-opacity="0.22" x1="130" y1="130" x2="52"  y2="175"/>
    <!-- Connecting (4D) edges -->
    <line stroke-width="1.6" stroke-opacity="0.55" x1="130" y1="40"  x2="130" y2="90"/>
    <line stroke-width="1.6" stroke-opacity="0.55" x1="208" y1="85"  x2="165" y2="110"/>
    <line stroke-width="1.6" stroke-opacity="0.55" x1="208" y1="175" x2="165" y2="150"/>
    <line stroke-width="1.6" stroke-opacity="0.55" x1="130" y1="220" x2="130" y2="170"/>
    <line stroke-width="1.6" stroke-opacity="0.55" x1="52"  y1="175" x2="95"  y2="150"/>
    <line stroke-width="1.6" stroke-opacity="0.55" x1="52"  y1="85"  x2="95"  y2="110"/>
    <!-- Inner hexagon -->
    <path stroke-width="2" stroke-opacity="0.82" d="M130,90 L165,110 L165,150 L130,170 L95,150 L95,110 Z"/>
    <!-- Inner visible interior -->
    <line stroke-width="1.7" stroke-opacity="0.76" x1="130" y1="130" x2="165" y2="110"/>
    <line stroke-width="1.7" stroke-opacity="0.76" x1="130" y1="130" x2="130" y2="170"/>
    <line stroke-width="1.7" stroke-opacity="0.76" x1="130" y1="130" x2="95"  y2="110"/>
    <!-- Inner hidden interior -->
    <line stroke-width="1" stroke-opacity="0.18" x1="130" y1="130" x2="130" y2="90"/>
    <line stroke-width="1" stroke-opacity="0.18" x1="130" y1="130" x2="165" y2="150"/>
    <line stroke-width="1" stroke-opacity="0.18" x1="130" y1="130" x2="95"  y2="150"/>
  </g>
  <g fill="#4FA463">
    <!-- Outer corner dots -->
    <circle cx="130" cy="40"  r="4"/>
    <circle cx="208" cy="85"  r="4"/>
    <circle cx="208" cy="175" r="4"/>
    <circle cx="130" cy="220" r="4"/>
    <circle cx="52"  cy="175" r="4"/>
    <circle cx="52"  cy="85"  r="4"/>
    <!-- Inner corner dots -->
    <circle cx="130" cy="90"  r="3"/>
    <circle cx="165" cy="110" r="3"/>
    <circle cx="165" cy="150" r="3"/>
    <circle cx="130" cy="170" r="3"/>
    <circle cx="95"  cy="150" r="3"/>
    <circle cx="95"  cy="110" r="3"/>
  </g>
</svg>
